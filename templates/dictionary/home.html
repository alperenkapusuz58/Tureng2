<!doctype html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tureng Clone - MVP</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 960px; margin: 30px auto; padding: 0 16px; }
        .tabs button { margin-right: 8px; padding: 10px 14px; cursor: pointer; }
        .tabs .active { background: #222; color: #fff; border: 1px solid #222; }
        .search-wrap { margin-top: 18px; position: relative; }
        input { width: 100%; padding: 12px; font-size: 16px; }
        .suggestions { list-style: none; padding: 0; margin: 4px 0 0; border: 1px solid #ddd; border-radius: 8px; }
        .suggestions li a { display: block; padding: 10px; text-decoration: none; color: #111; }
        .suggestions li a:hover { background: #f5f5f5; }
        .meta { color: #555; margin-top: 16px; font-size: 14px; }
        @media (max-width: 768px) {
        }
    </style>
</head>
<body>
    <h1>Dictionary MVP</h1>
    <p>Canli arama ile kelime secin veya Enter ile arayin.</p>

    <form method="get" action="/search/">
        <input type="hidden" name="direction" id="direction" value="en-tr">
        <div class="tabs">
            <button type="button" class="tab-btn active" data-direction="en-tr">Ingilizce -> Turkce</button>
            <button type="button" class="tab-btn" data-direction="tr-en">Turkce -> Ingilizce</button>
        </div>
        <div class="search-wrap">
            <input type="text" id="query" name="q" autocomplete="off" placeholder="Kelime yazin..." required>
            <ul class="suggestions" id="suggestions"></ul>
        </div>
    </form>

    <p class="meta">Not: Arama madde basi kelimelerde calisir. Klavye farklari icin yakin eslesme de denenir.</p>

    <script>
        const queryInput = document.getElementById('query');
        const suggestionsEl = document.getElementById('suggestions');
        const directionInput = document.getElementById('direction');
        const tabButtons = document.querySelectorAll('.tab-btn');

        tabButtons.forEach((btn) => {
            btn.addEventListener('click', () => {
                tabButtons.forEach((b) => b.classList.remove('active'));
                btn.classList.add('active');
                directionInput.value = btn.dataset.direction;
                suggestionsEl.innerHTML = '';
                queryInput.focus();
            });
        });

        queryInput.addEventListener('input', async () => {
            const q = queryInput.value.trim();
            const direction = directionInput.value;
            if (q.length < 2) {
                suggestionsEl.innerHTML = '';
                return;
            }

            const res = await fetch(`/api/autocomplete/?direction=${direction}&q=${encodeURIComponent(q)}`);
            const data = await res.json();
            suggestionsEl.innerHTML = '';

            data.results.forEach((item) => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="${item.url}">${item.lemma}</a>`;
                suggestionsEl.appendChild(li);
            });
        });
    </script>
</body>
</html>
