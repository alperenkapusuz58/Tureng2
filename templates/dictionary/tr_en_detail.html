<!doctype html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ headword.lemma }} - TR -> EN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #243b7a;
            --bg: #eef4f8;
            --text: #1c2d44;
            --muted: #60748b;
            --soft: #d8e4ef;
            --card: #ffffff;
            --yellow: #ffcc1a;
            --shadow: 0 18px 45px rgba(15, 34, 79, 0.12);
            --shadow-soft: 0 10px 24px rgba(15, 34, 79, 0.08);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Manrope", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            line-height: 1.45;
        }
        .page {
            max-width: 980px;
            margin: 14px auto;
            padding: 0 14px 18px;
        }
        .hero {
            padding: 14px 16px 16px;
            border-radius: 14px;
            background: var(--navy);
            color: #fff;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 11px;
            border-radius: 999px;
            background: rgba(255,255,255,0.14);
            color: #fff;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
        }
        .entry-header {
            margin: 12px 0 0;
            font-size: 24px;
            line-height: 1.1;
            font-weight: 700;
            color: #fff;
        }
        .hero-tools {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .listen {
            padding: 5px 10px;
            font-size: 11px;
            cursor: pointer;
            border: 0;
            border-radius: 999px;
            background: var(--yellow);
            color: #17304a;
            font-family: inherit;
            font-weight: 700;
        }
        .helper {
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            margin: 0;
        }
        .content {
            margin-top: 10px;
            padding: 0;
        }
        .list {
            display: grid;
            gap: 6px;
        }
        .list a {
            display: block;
            padding: 10px 0;
            text-decoration: none;
            color: var(--text);
            background: transparent;
            font-weight: 600;
            font-size: 14px;
        }
        .list a:hover {
            opacity: 0.75;
        }
        .empty-state {
            padding: 12px 0;
            color: var(--muted);
            text-align: left;
        }
        @media (max-width: 860px) {
            .page {
                margin: 10px auto;
                padding: 0 10px 14px;
            }
            .hero {
                padding: 14px;
                border-radius: 14px;
            }
            .entry-header {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <section class="hero">
            <a class="back-link" href="/">← Ana sayfa</a>
            <h1 class="entry-header">{{ headword.lemma }}</h1>
            <div class="hero-tools">
                <button class="listen" data-text="{{ headword.lemma }}" data-lang="tr-TR">Seslendir</button>
                <p class="helper">Ornek cumleleri gormek icin Ingilizce karsiliga tiklayin.</p>
            </div>
        </section>

        <section class="content">
            <div class="list">
                {% for link in links %}
                    <a href="/en-tr/{{ link.en_headword.slug }}/">{{ link.en_headword.lemma }}</a>
                {% empty %}
                    <div class="empty-state">Bu kelime icin Ingilizce karsilik henuz eklenmedi.</div>
                {% endfor %}
            </div>
        </section>
    </div>

    <script>
        function speakText(text, lang) {
            if (!('speechSynthesis' in window)) {
                return;
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang || 'tr-TR';
            utterance.rate = 0.85;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        document.querySelectorAll('.listen').forEach((btn) => {
            btn.addEventListener('click', () => {
                speakText(btn.dataset.text, btn.dataset.lang);
            });
        });
    </script>
</body>
</html>
